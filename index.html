<script>
const DATA = {"nodes": [{"id": "root", "type": "domen", "year": null, "gloss": "Зонтичный узел-домен, объединяющий все понятия осведомлённости у LLM.", "sources": "[авторское]", "name": "LLM awareness", "gloss_en": "Umbrella domain node uniting all awareness-related concepts in LLMs.", "src_en": "[author's call]"}, {"id": "sit", "type": "konstrukt", "year": 2021, "gloss": "Способность модели представлять факты о собственной ситуации: обучается она или используется, наблюдают ли за ней, какая архитектура и т.д.", "sources": "Cotra 2021 [якорь]; Ngo 2209.00626 [якорь]; Berglund 2309.00667", "name": "situational awareness", "gloss_en": "The model's ability to represent facts about its own situation: whether it is being trained or deployed, whether it is monitored, its architecture, etc.", "src_en": "Cotra 2021 [якорь]; Ngo 2209.00626 [якорь]; Berglund 2309.00667"}, {"id": "self", "type": "konstrukt", "year": 2022, "косв": true, "gloss": "Осведомлённость модели о собственных знаниях, ограничениях и идентичности.", "sources": "Kadavath, arXiv:2207.05221 [косвенно: операционализация, не verbatim-термин]", "name": "self-awareness", "gloss_en": "The model's awareness of its own knowledge, limitations, and identity.", "src_en": "Kadavath, arXiv:2207.05221 [indirect: operationalization, not the verbatim term]"}, {"id": "meta", "type": "konstrukt", "year": 2023, "gloss": "Способность модели отслеживать и оценивать собственные когнитивные процессы.", "sources": "Wang & Zhao, arXiv:2308.05342 (verbatim в заголовке)", "name": "metacognition", "gloss_en": "The model's ability to monitor and evaluate its own cognitive processes.", "src_en": "Wang & Zhao, arXiv:2308.05342 (verbatim in the title)"}, {"id": "soc", "type": "konstrukt", "year": 2022, "косв": true, "gloss": "Осведомлённость модели о ментальных состояниях и намерениях собеседника/других агентов.", "sources": "Sap et al., arXiv:2210.13312 [косвенно: ToM-in-LLMs, не verbatim \"social awareness\"]", "name": "social awareness", "gloss_en": "The model's awareness of the mental states and intentions of interlocutors / other agents.", "src_en": "Sap et al., arXiv:2210.13312 [indirect: ToM-in-LLMs, not verbatim “social awareness”]"}, {"id": "ea", "type": "konstrukt", "year": 2024, "косв": true, "gloss": "Осведомлённость модели о факте прохождения оценивания — частный случай situational awareness.", "sources": "SAD, arXiv:2407.04694 [косвенно: stages-oversight операционализирует различение eval/deploy до появления термина]; формализация — Needham, arXiv:2505.23836 [авторское: is-a, не part-of — расхождение см. реестр]", "name": "evaluation awareness", "gloss_en": "The model's awareness that it is being evaluated — a special case of situational awareness.", "src_en": "SAD, arXiv:2407.04694 [indirect: stages-oversight operationalizes the eval/deploy distinction before the term appeared]; formalization — Needham, arXiv:2505.23836 [author's call: is-a, not part-of — see divergence registry]"}, {"id": "dep", "type": "konstrukt", "year": 2024, "gloss": "Осведомлённость модели о факте нахождения в развёрнутом (не тестовом) режиме — сиблинг evaluation awareness.", "sources": "SAD, arXiv:2407.04694 (verbatim-определение SA включает eval/deploy различение)", "name": "deployment awareness", "gloss_en": "The model's awareness of being in deployed (non-test) mode — sibling of evaluation awareness.", "src_en": "SAD, arXiv:2407.04694 (the verbatim SA definition includes the eval/deploy distinction)"}, {"id": "kba", "type": "konstrukt", "year": 2022, "косв": true, "gloss": "Осведомлённость модели о границах собственных знаний (что она знает / не знает).", "sources": "Kadavath, arXiv:2207.05221 [косвенно]; формализация — AwareBench, arXiv:2401.17882", "name": "knowledge boundary awareness", "gloss_en": "The model's awareness of the boundaries of its own knowledge (what it does / does not know).", "src_en": "Kadavath, arXiv:2207.05221 [indirect]; formalization — AwareBench, arXiv:2401.17882"}, {"id": "int", "type": "konstrukt", "year": 2025, "gloss": "Осведомлённость модели о характеристиках собеседника в диалоге.", "sources": "arXiv:2506.22957 (verbatim-анкер и первая операционализация)", "name": "interlocutor awareness", "gloss_en": "The model's awareness of the characteristics of its dialogue partner.", "src_en": "arXiv:2506.22957 (verbatim anchor and first operationalization)"}, {"id": "oocr", "type": "kapabiliti", "year": 2023, "gloss": "Out-of-context reasoning — способность делать выводы из фактов, усвоенных при обучении, без явного предъявления их в контексте.", "sources": "Berglund, arXiv:2309.00667", "name": "OOCR", "gloss_en": "Out-of-context reasoning — the ability to draw inferences from facts learned in training without their explicit presence in context.", "src_en": "Berglund, arXiv:2309.00667"}, {"id": "intr", "type": "kapabiliti", "year": 2024, "gloss": "Способность модели сообщать о собственных внутренних состояниях (намерениях, уверенности, представлениях).", "sources": "Binder et al., arXiv:2410.13787", "name": "introspection", "gloss_en": "The model's ability to report its own internal states (intentions, confidence, representations).", "src_en": "Binder et al., arXiv:2410.13787"}, {"id": "bsa", "type": "kapabiliti", "year": 2025, "gloss": "Осведомлённость модели о собственных поведенческих склонностях, приобретённых при дообучении.", "sources": "Betley et al., arXiv:2501.11120", "name": "behavioral self-awareness", "gloss_en": "The model's awareness of its own behavioral policies acquired during fine-tuning.", "src_en": "Betley et al., arXiv:2501.11120"}, {"id": "sr", "type": "kapabiliti", "year": 2024, "gloss": "Способность модели идентифицировать собственные выходы среди прочих текстов.", "sources": "SAD, arXiv:2407.04694", "name": "self-recognition", "gloss_en": "The model's ability to identify its own outputs among other texts.", "src_en": "SAD, arXiv:2407.04694"}, {"id": "sp", "type": "kapabiliti", "year": 2024, "gloss": "Способность модели точно предсказывать своё собственное поведение в гипотетических ситуациях.", "sources": "Binder et al., arXiv:2410.13787", "name": "self-prediction", "gloss_en": "The model's ability to accurately predict its own behavior in hypothetical scenarios.", "src_en": "Binder et al., arXiv:2410.13787"}, {"id": "ci", "type": "kapabiliti", "year": 2025, "gloss": "Способность модели вербально отчитываться об искусственно инъецированных в активации концептах (introspective awareness).", "sources": "Lindsey 2025; arXiv:2601.01828", "name": "concept-injection", "gloss_en": "The model's ability to verbally report concepts artificially injected into its activations (introspective awareness).", "src_en": "Lindsey 2025; arXiv:2601.01828"}, {"id": "da", "type": "strategiya", "year": 2019, "gloss": "Диспозиция модели вести себя согласованно во время обучения инструментально, скрывая иные истинные цели, до момента развёртывания.", "sources": "Hubinger et al., arXiv:1906.01820", "name": "deceptive alignment", "gloss_en": "The model's disposition to behave aligned during training instrumentally, concealing different true goals until deployment.", "src_en": "Hubinger et al., arXiv:1906.01820"}, {"id": "dia", "type": "strategiya", "year": 2019, "gloss": "Разновидность deceptive alignment, где инструментальность обмана явно мотивирована мезацелями оптимизатора.", "sources": "Hubinger et al., arXiv:1906.01820", "name": "deceptive instr. alignment", "gloss_en": "A variant of deceptive alignment where the instrumentality of deception is explicitly motivated by the mesa-optimizer's goals.", "src_en": "Hubinger et al., arXiv:1906.01820"}, {"id": "sch", "type": "strategiya", "year": 2023, "gloss": "Диспозиция модели хорошо выполнять задачи обучения ради последующего получения власти/влияния.", "sources": "Carlsmith, arXiv:2311.08379 (Nov 2023)", "name": "scheming", "gloss_en": "The model's disposition to perform well in training in order to gain power/influence later.", "src_en": "Carlsmith, arXiv:2311.08379 (Nov 2023)"}, {"id": "ics", "type": "strategiya", "year": 2024, "gloss": "Демонстрация scheming-поведения в рамках одного контекста/эпизода без переноса через обучение.", "sources": "Meinke et al., arXiv:2412.04984", "name": "in-context scheming", "gloss_en": "Scheming behavior demonstrated within a single context/episode, without transfer through training.", "src_en": "Meinke et al., arXiv:2412.04984"}, {"id": "sd", "type": "strategiya", "year": 2023, "gloss": "Систематическое формирование ложных убеждений у людей ради иной цели, чем истина — самостоятельный узел, отношение к scheming не декларировано в литературе (contested).", "sources": "Park et al., arXiv:2308.14752 (Aug 2023)", "name": "strategic deception", "gloss_en": "Systematically producing false beliefs in humans in pursuit of an outcome other than truth — standalone node; its relation to scheming is not declared in the literature (contested).", "src_en": "Park et al., arXiv:2308.14752 (Aug 2023)"}, {"id": "sand", "type": "povedenie", "year": 2024, "gloss": "Намеренное занижение моделью своих результатов на оценивании.", "sources": "van der Weij et al., arXiv:2406.07358", "name": "sandbagging", "gloss_en": "The model intentionally underperforming on an evaluation.", "src_en": "van der Weij et al., arXiv:2406.07358"}, {"id": "exh", "type": "povedenie", "year": 2025, "авт": true, "gloss": "Занижение результатов конкретно в фазе RL-исследования (exploration) — понижен до авторского статуса, датированный первоисточник Redwood не подтверждён оперативно.", "sources": "[авторское, предварительно] Redwood Research (документ не идентифицирован по URL/дате)", "name": "exploration hacking", "gloss_en": "Underperformance specifically in the RL exploration phase — downgraded to provisional status; a dated Redwood primary source was not promptly identified.", "src_en": "[provisional, author's call] Redwood Research (document not identified by URL/date)"}, {"id": "af", "type": "povedenie", "year": 2024, "gloss": "Модель имитирует согласованность во время обучения, стратегически рассуждая о сохранении текущих ценностей. 14% — комплаенс с вредными запросами от \"бесплатных\" пользователей в эксперименте.", "sources": "Greenblatt et al., arXiv:2412.14093 (verbatim: 14%)", "name": "alignment faking", "gloss_en": "The model feigns alignment during training, strategically reasoning about preserving its current values. 14% — compliance with harmful requests from free-tier users in the experiment.", "src_en": "Greenblatt et al., arXiv:2412.14093 (verbatim: 14%)"}, {"id": "bd", "type": "povedenie", "year": 2024, "gloss": "Скрытое вредоносное поведение, устойчивое к стандартным процедурам safety-training, активируемое триггером (напр. фактом развёртывания).", "sources": "Hubinger et al., arXiv:2401.05566", "name": "backdoor / sleeper-agent", "gloss_en": "Hidden harmful behavior, robust to standard safety training, activated by a trigger (e.g., the fact of deployment).", "src_en": "Hubinger et al., arXiv:2401.05566"}, {"id": "os", "type": "povedenie", "year": 2024, "gloss": "Попытки модели отключить или обойти механизмы надзора.", "sources": "Meinke et al., arXiv:2412.04984", "name": "oversight subversion", "gloss_en": "The model's attempts to disable or bypass oversight mechanisms.", "src_en": "Meinke et al., arXiv:2412.04984"}, {"id": "se", "type": "povedenie", "year": 2024, "gloss": "Попытки модели скопировать себя за пределы контролируемой среды.", "sources": "Meinke et al., arXiv:2412.04984", "name": "self-exfiltration", "gloss_en": "The model's attempts to copy itself outside the controlled environment.", "src_en": "Meinke et al., arXiv:2412.04984"}, {"id": "ca", "type": "povedenie", "year": 2025, "gloss": "Скрытое нарушение правил или намеренное занижение результатов как наблюдаемое действие (операциональный прокси для scheming).", "sources": "Schoen et al., arXiv:2509.15541", "name": "covert action", "gloss_en": "Covert rule-breaking or intentional underperformance as an observable action (an operational proxy for scheming).", "src_en": "Schoen et al., arXiv:2509.15541"}, {"id": "eg", "type": "povedenie", "year": 2026, "авт": true, "gloss": "Манипуляция моделью процессом/условиями оценивания в свою пользу; статус ослаблен — не проходит формальный критерий включения (1 корпусная работа), оставлен как активно используемый термин.", "sources": "[авторское, предварительно] LessWrong framework", "name": "evaluation gaming", "gloss_en": "The model manipulating the evaluation process/conditions in its favor; weakened status — fails the formal inclusion criterion (1 corpus work), kept as an actively used term.", "src_en": "[provisional, author's call] LessWrong framework"}, {"id": "vea", "type": "povedenie", "year": 2025, "gloss": "Verbalized evaluation awareness — явное упоминание моделью факта оценивания в цепочке рассуждений (CoT); используется как измеримый прокси для EA, но само является наблюдаемым поведенческим паттерном.", "sources": "Needham, arXiv:2505.23836; Goodfire/UK AISI 2026", "name": "VEA", "gloss_en": "Verbalized evaluation awareness — the model explicitly mentioning the fact of evaluation in its chain of thought (CoT); a measurable proxy for EA that is itself an observable behavioral pattern.", "src_en": "Needham, arXiv:2505.23836; Goodfire/UK AISI 2026"}, {"id": "sad", "type": "benchmark", "year": 2024, "gloss": "Situational Awareness Dataset — бенчмарк для измерения situational awareness LLM.", "sources": "Laine et al., arXiv:2407.04694", "name": "SAD", "gloss_en": "Situational Awareness Dataset — a benchmark measuring situational awareness in LLMs.", "src_en": "Laine et al., arXiv:2407.04694"}, {"id": "awb", "type": "benchmark", "year": 2024, "gloss": "Бенчмарк для измерения knowledge-boundary-related self-awareness.", "sources": "Li et al., arXiv:2401.17882", "name": "AwareBench", "gloss_en": "A benchmark measuring knowledge-boundary-related self-awareness.", "src_en": "Li et al., arXiv:2401.17882"}, {"id": "eab", "type": "benchmark", "year": 2026, "gloss": "Специализированный бенчмарк для измерения evaluation awareness.", "sources": "Li et al., arXiv:2605.23055", "name": "EvalAwareBench", "gloss_en": "A specialized benchmark measuring evaluation awareness.", "src_en": "Li et al., arXiv:2605.23055"}, {"id": "need", "type": "benchmark", "year": 2025, "gloss": "Бенчмарк для измерения evaluation awareness, включая verbalized-форму (VEA).", "sources": "Needham et al., arXiv:2505.23836", "name": "eval-aware (Needham)", "gloss_en": "A benchmark measuring evaluation awareness, including its verbalized form (VEA).", "src_en": "Needham et al., arXiv:2505.23836"}, {"id": "sa23", "type": "benchmark", "year": 2023, "gloss": "Датасет из 1032 неотвечаемых вопросов для измерения self-knowledge/knowledge-boundary awareness.", "sources": "Yin et al., arXiv:2305.18153 (May 2023)", "name": "SelfAware", "gloss_en": "A dataset of 1,032 unanswerable questions measuring self-knowledge / knowledge-boundary awareness.", "src_en": "Yin et al., arXiv:2305.18153 (May 2023)"}, {"id": "awbb", "type": "benchmark", "year": 2026, "gloss": "Первый комплексный бенчмарк когнитивных способностей LM по 4 измерениям (metacognition, self-awareness, social awareness, situational awareness), 15 когнитивных функций, 14 381 пример.", "sources": "Li et al., ACL Anthology 2026.acl-long.124 (li-etal-2026-awarenessbench)", "name": "AwarenessBench", "gloss_en": "The first comprehensive benchmark of LM cognitive abilities across 4 dimensions (metacognition, self-awareness, social awareness, situational awareness), 15 cognitive functions, 14,381 samples.", "src_en": "Li et al., ACL Anthology 2026.acl-long.124 (li-etal-2026-awarenessbench)"}, {"id": "lp", "type": "mitigatsiya", "year": 2025, "gloss": "Линейные пробы по активациям для детекции evaluation awareness — инструмент детекции в составе митигационного контура.", "sources": "Nguyen et al., arXiv:2507.01786", "name": "linear probes", "gloss_en": "Linear probes on activations for detecting evaluation awareness — a detection instrument within the mitigation loop.", "src_en": "Nguyen et al., arXiv:2507.01786"}, {"id": "as", "type": "mitigatsiya", "year": 2025, "gloss": "Управление активациями модели для подавления нежелательного поведения, связанного с EA.", "sources": "Nguyen, arXiv:2507.01786; arXiv:2510.20487", "name": "activation steering", "gloss_en": "Steering the model's activations to suppress undesired EA-related behavior.", "src_en": "Nguyen, arXiv:2507.01786; arXiv:2510.20487"}, {"id": "asch", "type": "mitigatsiya", "year": 2025, "gloss": "Deliberative alignment / anti-scheming training — метод обучения, снижающий склонность модели к scheming.", "sources": "Schoen et al., arXiv:2509.15541", "name": "anti-scheming training", "gloss_en": "Deliberative alignment / anti-scheming training — a training method reducing the model's propensity to scheme.", "src_en": "Schoen et al., arXiv:2509.15541"}, {"id": "cm", "type": "mitigatsiya", "year": 2024, "косв": true, "gloss": "Мониторинг цепочки рассуждений (CoT) для обнаружения scheming-поведения.", "sources": "[косвенно] Meinke et al., arXiv:2412.04984 — операционализирует детекцию через анализ CoT-трасс (\"let's hack\", \"let's sabotage\")", "name": "CoT monitoring", "gloss_en": "Monitoring the chain of thought (CoT) to detect scheming behavior.", "src_en": "[indirect] Meinke et al., arXiv:2412.04984 — operationalizes detection via CoT-trace analysis (“let's hack”, “let's sabotage”)"}, {"id": "lure", "type": "mitigatsiya", "year": 2026, "gloss": "Метод подавления/коррекции нежелательного поведения, связанного с evaluation awareness.", "sources": "arXiv:2605.26438", "name": "LURE", "gloss_en": "A method for suppressing/correcting undesired behavior related to evaluation awareness.", "src_en": "arXiv:2605.26438"}, {"id": "pre", "type": "mitigatsiya", "year": 2025, "gloss": "Probe-Rewrite-Evaluate — трёхэтапный митигационный контур для evaluation awareness.", "sources": "Xiong et al., arXiv:2509.00591", "name": "Probe-Rewrite-Evaluate", "gloss_en": "Probe-Rewrite-Evaluate — a three-stage mitigation loop for evaluation awareness.", "src_en": "Xiong et al., arXiv:2509.00591"}, {"id": "sm", "type": "mitigatsiya", "year": 2025, "gloss": "Самомониторинг модели как способ снижения deceptive alignment.", "sources": "arXiv:2505.18807", "name": "self-monitoring", "gloss_en": "The model's self-monitoring as a way to reduce deceptive alignment.", "src_en": "arXiv:2505.18807"}], "skel": [{"s": "root", "t": "sit", "rel": "part-of", "note": "[авторское: декомпозиция вслед за survey 2504.20084]"}, {"s": "root", "t": "self", "rel": "part-of", "note": "[авторское]"}, {"s": "root", "t": "meta", "rel": "part-of", "note": "[авторское]"}, {"s": "root", "t": "soc", "rel": "part-of", "note": "[авторское]"}, {"s": "sit", "t": "ea", "rel": "is-a"}, {"s": "sit", "t": "dep", "rel": "is-a"}, {"s": "self", "t": "kba", "rel": "is-a"}, {"s": "soc", "t": "int", "rel": "is-a", "косв": true}, {"s": "sch", "t": "ics", "rel": "is-a"}, {"s": "sch", "t": "da", "rel": "is-a", "inversion": true, "note": "⚠ инверсия −4 года"}, {"s": "da", "t": "dia", "rel": "is-a"}, {"s": "sand", "t": "exh", "rel": "is-a"}, {"s": "oocr", "t": "bsa", "rel": "is-a"}, {"s": "intr", "t": "sp", "rel": "is-a"}, {"s": "intr", "t": "sr", "rel": "is-a"}, {"s": "intr", "t": "ci", "rel": "is-a"}], "cross": [{"s": "sit", "t": "oocr", "rel": "acquired-via"}, {"s": "ea", "t": "sand", "rel": "enables"}, {"s": "ea", "t": "eg", "rel": "enables"}, {"s": "da", "t": "af", "rel": "manifests-as"}, {"s": "sch", "t": "os", "rel": "manifests-as"}, {"s": "sch", "t": "se", "rel": "manifests-as"}, {"s": "sch", "t": "ca", "rel": "manifests-as"}, {"s": "sit", "t": "sch", "rel": "enables"}, {"s": "dep", "t": "bd", "rel": "enables"}, {"s": "sit", "t": "af", "rel": "enables"}, {"s": "sit", "t": "sad", "rel": "measured-by"}, {"s": "intr", "t": "sad", "rel": "measured-by", "note": "[косвенно]"}, {"s": "sr", "t": "sad", "rel": "measured-by"}, {"s": "ea", "t": "sad", "rel": "measured-by", "note": "[косвенно: stages-oversight]"}, {"s": "self", "t": "awb", "rel": "measured-by", "note": "[косвенно]"}, {"s": "soc", "t": "awb", "rel": "measured-by", "note": "[косвенно]"}, {"s": "ea", "t": "eab", "rel": "measured-by"}, {"s": "ea", "t": "need", "rel": "measured-by"}, {"s": "vea", "t": "need", "rel": "measured-by"}, {"s": "kba", "t": "sa23", "rel": "measured-by"}, {"s": "meta", "t": "awbb", "rel": "measured-by", "note": "verbatim: 1 из 4 измерений абстракта"}, {"s": "self", "t": "awbb", "rel": "measured-by", "note": "verbatim: 1 из 4 измерений абстракта"}, {"s": "soc", "t": "awbb", "rel": "measured-by", "note": "verbatim: 1 из 4 измерений абстракта"}, {"s": "sit", "t": "awbb", "rel": "measured-by", "note": "verbatim: 1 из 4 измерений абстракта"}, {"s": "ea", "t": "lp", "rel": "measured-by", "note": "детекция в составе митигационного контура"}, {"s": "ea", "t": "as", "rel": "mitigated-by"}, {"s": "ea", "t": "lure", "rel": "mitigated-by"}, {"s": "ea", "t": "pre", "rel": "mitigated-by"}, {"s": "sch", "t": "asch", "rel": "mitigated-by"}, {"s": "sch", "t": "cm", "rel": "mitigated-by"}, {"s": "da", "t": "sm", "rel": "mitigated-by"}]};
const COL={domen:'#9aa3b2',konstrukt:'#6da8ff',kapabiliti:'#45d6a4',strategiya:'#ffa066',povedenie:'#ff7d9c',benchmark:'#b39cff',mitigatsiya:'#ffd166'};
const UI={
 en:{sub:'a concept map · taxonomy × chronology of first appearance',labels:['Edge labels: off','Edge labels: on'],inv:'Inversions',
     hint:'Hover or click a node to see its definition and sources. Drag to pan, scroll to zoom.',
     lanes:{konstrukt:'CONSTRUCTS',kapabiliti:'CAPABILITIES',strategiya:'STRATEGIES',povedenie:'BEHAVIORS',benchmark:'BENCHMARKS',mitigatsiya:'MITIGATIONS'},
     types:{domen:'domain',konstrukt:'construct',kapabiliti:'capability',strategiya:'strategy',povedenie:'behavior',benchmark:'benchmark',mitigatsiya:'mitigation'},
     out:'outside the skeleton',rail:'measurement layer · measured-by / mitigated-by edges only',
     foot:'node year = first notable use or operationalization of the concept in LLM literature · ~YYYY precision · sources: arXiv + project registries',
     tagInd:'[i]',tagProv:'[p]',gloss:'definition',src:'sources',yr:'year',
     invNote:'⚠ inversion: the child concept predates its parent by ',years:' yrs'},
 ru:{sub:'карта понятий · таксономия × хронология первого появления',labels:['Подписи рёбер: выкл','Подписи рёбер: вкл'],inv:'Инверсии',
     hint:'Наведите или кликните узел, чтобы увидеть определение и источники. Перетаскивание — панорама, колесо — зум.',
     lanes:{konstrukt:'КОНСТРУКТЫ',kapabiliti:'СПОСОБНОСТИ',strategiya:'СТРАТЕГИИ',povedenie:'ПОВЕДЕНИЯ',benchmark:'БЕНЧМАРКИ',mitigatsiya:'МИТИГАЦИИ'},
     types:{domen:'домен',konstrukt:'конструкт',kapabiliti:'способность',strategiya:'стратегия',povedenie:'поведение',benchmark:'бенчмарк',mitigatsiya:'митигация'},
     out:'вне скелета',rail:'измерительный контур · только measured-by / mitigated-by',
     foot:'год узла = первое употребление или операционализация понятия в LLM-литературе · точность ~YYYY · источники: arXiv, реестры проекта',
     tagInd:'[к]',tagProv:'[а]',gloss:'определение',src:'источники',yr:'год',
     invNote:'⚠ инверсия: дочернее понятие старше родительского на ',years:' г.'}};
let lang='en', labelsOn=false, invIdx=-1;

const byId={}; DATA.nodes.forEach(n=>byId[n.id]=n);
// раскладка: колонки-годы -> строки (перенос из постера)
const LANES=[
 ['konstrukt',{2021:['sit'],2022:['self','kba','soc'],2023:['meta'],2024:['ea','dep'],2025:['int']}],
 ['kapabiliti',{2023:['oocr'],2024:['sr','intr','sp'],2025:['bsa','ci']}],
 ['strategiya',{2019:['da','dia'],2023:['sch','sd'],2024:['ics']}],
 ['povedenie',{2024:['sand','af','os','se','bd'],2025:['exh','vea','ca'],2026:['eg']}],
 ['benchmark',{2023:['sa23'],2024:['sad','awb'],2025:['need'],2026:['eab','awbb']}],
 ['mitigatsiya',{2024:['cm'],2025:['lp','as','asch','pre','sm'],2026:['lure']}]];
const W=2280,ROW=36,X0=290,X1=2130,colw=(X1-X0)/7,YX=y=>X0+(y-2019)*colw;
let ytop=70; const POS={},LBOX=[];
for(const[t,order]of LANES){
 if(t==='benchmark')ytop+=26;
 const rows=Math.max(...Object.values(order).map(v=>v.length)), h=rows*ROW+22;
 LBOX.push({t,y:ytop,h});
 for(const[yr,ids]of Object.entries(order))ids.forEach((id,r)=>POS[id]=[YX(+yr),ytop+24+r*ROW]);
 ytop+=h+12;
}
POS['root']=[150,LBOX[0].y+LBOX[0].h/2];
const HT=ytop+30;

// инверсии — вычисляются из данных
const inversions=DATA.skel.filter(l=>{const p=byId[l.s],c=byId[l.t];return p.year&&c.year&&c.year<p.year;});
const flagged=DATA.skel.filter(l=>l.inversion);
if(JSON.stringify(inversions.map(l=>l.s+'>'+l.t).sort())!==JSON.stringify(flagged.map(l=>l.s+'>'+l.t).sort()))
 console.warn('Data drift: computed inversions differ from flagged ones', inversions, flagged);

const svg=d3.select('#svg').attr('viewBox',[0,0,W,HT]);
const g=svg.append('g');
const zoomB=d3.zoom().scaleExtent([0.6,5]).on('zoom',e=>g.attr('transform',e.transform));
svg.call(zoomB);

// страты
const laneG=g.append('g');
// сетка лет
const gridG=g.append('g');
for(let y=2019;y<=2026;y++){
 gridG.append('line').attr('x1',YX(y)).attr('x2',YX(y)).attr('y1',56).attr('y2',HT-24).attr('stroke','#fff').attr('stroke-opacity',.05);
 gridG.append('text').attr('x',YX(y)).attr('y',46).attr('text-anchor','middle').attr('fill','#5a6172').attr('font-size',9).text('~'+y);
}
const CONC=new Set(['enables','manifests-as','acquired-via']);
function path(a,b,rad){const[x1,y1]=POS[a],[x2,y2]=POS[b];const mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1;
 return `M${x1},${y1} Q${mx-dy*rad},${my+dx*rad} ${x2},${y2}`;}
const edgeG=g.append('g');
const crossSel=edgeG.selectAll('.cross').data(DATA.cross).join('path')
 .attr('class','link cross').attr('d',d=>path(d.s,d.t,.1)).attr('stroke','#cdd5e6')
 .attr('stroke-dasharray','4 4').attr('stroke-width',d=>CONC.has(d.rel)?1:.7)
 .attr('stroke-opacity',d=>CONC.has(d.rel)?.32:.13);
const skelSel=edgeG.selectAll('.skel').data(DATA.skel.filter(l=>!inversions.includes(l))).join('path')
 .attr('class','link skel').attr('d',d=>path(d.s,d.t,.12)).attr('stroke','#b9c2d4')
 .attr('stroke-width',1.1).attr('stroke-opacity',.55);
// подписи рёбер
const elG=g.append('g');
[...DATA.cross].forEach(d=>{
 const[x1,y1]=POS[d.s],[x2,y2]=POS[d.t];
 elG.append('text').attr('class','edge-label').attr('x',(x1+x2)/2).attr('y',(y1+y2)/2-4)
  .attr('text-anchor','middle').attr('fill','#9aa2b6').attr('font-size',9.5)
  .attr('paint-order','stroke').attr('stroke','#0c0f16').attr('stroke-width',3).text(d.rel);
});
// инверсии — красные стрелки
svg.append('defs').append('marker').attr('id','arr').attr('viewBox','0 0 10 10').attr('refX',9).attr('refY',5)
 .attr('markerWidth',7).attr('markerHeight',7).attr('orient','auto-start-reverse')
 .append('path').attr('d','M0,0L10,5L0,10z').attr('fill','#ff5a57');
const invSel=edgeG.selectAll('.inv').data(inversions).join('path')
 .attr('class','link inv').attr('d',d=>path(d.s,d.t,-.18)).attr('stroke','#ff5a57')
 .attr('stroke-width',2.2).attr('stroke-opacity',.95).attr('marker-end','url(#arr)');
// узлы
const nodeG=g.append('g');
const nodes=nodeG.selectAll('g').data(DATA.nodes.filter(n=>POS[n.id])).join('g')
 .attr('class','node').attr('transform',n=>`translate(${POS[n.id]})`);
nodes.append('circle').attr('r',6).attr('fill',n=>COL[n.type]);
inversions.forEach(l=>[l.s,l.t].forEach(id=>{
 nodeG.append('circle').attr('cx',POS[id][0]).attr('cy',POS[id][1]).attr('r',11)
 .attr('fill','none').attr('stroke','#ff5a57').attr('stroke-width',1).attr('stroke-dasharray','2 2');}));
const nlab=nodes.append('text').attr('x',11).attr('y',3).attr('fill','#e9edf5').attr('font-size',10);
const ylab=nodes.append('text').attr('y',3).attr('fill','#8d95a7').attr('font-size',8.5);

function tag(n){const u=UI[lang];return n['косв']?' '+u.tagInd:(n['авт']?' '+u.tagProv:'');}
function render(){
 const u=UI[lang];
 document.getElementById('subtitle').textContent=u.sub;
 document.getElementById('btn-labels').textContent=u.labels[labelsOn?1:0];
 document.getElementById('btn-inv').textContent=`${u.inv}: ${inversions.length}`;
 document.getElementById('hint').textContent=u.hint;
 document.getElementById('foot-l').textContent=u.foot;
 document.body.classList.toggle('labels-on',labelsOn);
 laneG.selectAll('*').remove();
 for(const b of LBOX){
  laneG.append('rect').attr('x',X0-60).attr('y',b.y).attr('width',X1-X0+180).attr('height',b.h)
   .attr('fill',COL[b.t]).attr('opacity',.045);
  laneG.append('text').attr('x',16).attr('y',b.y+16).attr('fill',COL[b.t]).attr('font-size',10.5).text(u.lanes[b.t]);
  if(b.t==='benchmark'||b.t==='mitigatsiya')
   laneG.append('text').attr('x',16).attr('y',b.y+30).attr('fill','#5a6172').attr('font-size',7.5).text(u.out);
  if(b.t==='benchmark'){
   laneG.append('line').attr('x1',16).attr('x2',X1+120).attr('y1',b.y-13).attr('y2',b.y-13).attr('stroke','#fff').attr('stroke-opacity',.1);
   laneG.append('text').attr('x',X1+120).attr('y',b.y-18).attr('text-anchor','end').attr('fill','#5a6172').attr('font-size',7.5).text(u.rail);
  }
 }
 nlab.text(n=>n.name);
 ylab.attr('x',n=>11+n.name.length*6.1+6).text(n=>n.year?('~'+n.year+tag(n)):(u.types.domen));
}
function showPanel(n){
 const u=UI[lang];
 document.getElementById('panel').innerHTML=
  `<h2>${n.name}</h2><span class="badge" style="background:${COL[n.type]}">${u.types[n.type]}</span>`+
  (n.year?`<span class="badge" style="background:#39415a;color:#e9edf5">~${n.year}${tag(n)}</span>`:'')+
  `<div class="lbl">${u.gloss}</div><div>${lang==='ru'?(n.gloss||''):(n.gloss_en||'')}</div>`+
  `<div class="lbl">${u.src}</div><div style="color:#aab2c4">${lang==='ru'?(n.sources||''):(n.src_en||'')}</div>`;
}
const adj={}; [...DATA.skel,...DATA.cross].forEach(l=>{(adj[l.s]=adj[l.s]||new Set()).add(l.t);(adj[l.t]=adj[l.t]||new Set()).add(l.s);});
nodes.on('mouseenter',(e,n)=>{showPanel(n);
  nodes.classed('dimmed',m=>m.id!==n.id&&!(adj[n.id]&&adj[n.id].has(m.id)));
  d3.selectAll('.link').classed('dimmed',l=>l.s!==n.id&&l.t!==n.id);})
 .on('mouseleave',()=>{nodes.classed('dimmed',false);d3.selectAll('.link').classed('dimmed',false);})
 .on('click',(e,n)=>showPanel(n));
document.getElementById('btn-labels').onclick=()=>{labelsOn=!labelsOn;render();};
document.getElementById('btn-inv').onclick=()=>{
 if(!inversions.length)return;
 invIdx=(invIdx+1)%inversions.length;const l=inversions[invIdx];
 const[x1,y1]=POS[l.s],[x2,y2]=POS[l.t];showPanel(byId[l.t]);
 const u=UI[lang],d=byId[l.s].year-byId[l.t].year;
 document.getElementById('panel').innerHTML=`<div style="color:#ff5a57;margin-bottom:12px">${u.invNote}${d}${u.years}</div>`+document.getElementById('panel').innerHTML;
 svg.transition().duration(600).call(zoomB.transform,d3.zoomIdentity.translate(W/2-(x1+x2)/2*1.4,HT/2-(y1+y2)/2*1.4).scale(1.4));
};
render();
</script>
</body>
</html>
